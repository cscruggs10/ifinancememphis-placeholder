<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iFinance Memphis — Coming Soon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #f8fafc;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(16, 185, 129, 0.06) 0%, transparent 50%);
      animation: drift 20s ease-in-out infinite;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-2%, 2%); }
    }

    .container {
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
      max-width: 600px;
    }

    .logo {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #3b82f6, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-bottom: 3rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .coming-soon {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #e2e8f0;
    }

    .description {
      font-size: 1rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 3rem;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, #3b82f6, #10b981);
      margin: 0 auto 2rem;
      border-radius: 1px;
    }

    .contact {
      font-size: 0.9rem;
      color: #64748b;
    }

    .contact a {
      color: #3b82f6;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact a:hover {
      color: #60a5fa;
    }

    .location {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">iFinance Memphis</h1>
    <p class="tagline">Automotive Finance Solutions</p>
    <div class="divider"></div>
    <h2 class="coming-soon">Coming Soon</h2>
    <p class="description">
      We're building something new. Our website is currently under construction.
    </p>
    <div class="contact">
      <p><a href="mailto:corey@ifinancememphis.com">corey@ifinancememphis.com</a></p>
      <p class="location">Memphis, TN</p>
    </div>
  </div>
</body>
</html>
